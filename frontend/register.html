<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar sua conta | Interview Trainer AI</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="auth-container">
        <form id="register-form">
            <h1>Crie sua conta</h1>
            <p>Comece a treinar para sua próxima entrevista agora.</p>
            
            <input type="text" id="name" placeholder="Nome Completo" required>
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="password" placeholder="Senha" required>
            <input type="password" id="confirm-password" placeholder="Confirmar Senha" required>
            
            <button type="submit" class="btn-primary">Registrar-se</button>
            <p>Já tem uma conta? <a href="/frontend/login.html">Entrar</a></p>
        </form>
    </main>
    <script type="module" src="/frontend/js/app.js"></script>
</body>
</html>
